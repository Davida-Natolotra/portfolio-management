<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-circle"><i class="pi pi-chart-pie"></i></div>
      <h2>Mega Able</h2>
      <p>Sign in to your account</p>
    </div>

    <form class="auth-form" (ngSubmit)="submit()">
      @if (error()) {
        <div class="error-banner">
          <i class="pi pi-exclamation-circle"></i> {{ error() }}
        </div>
      }

      <div class="field">
        <label for="username">Username</label>
        <input pInputText id="username" type="text" placeholder="Enter your username"
          [ngModel]="username()" (ngModelChange)="username.set($event)" name="username" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <p-password
          inputId="password"
          placeholder="Enter your password"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password" />
      </div>

      <div class="remember-row">
        <div class="check-row">
          <p-checkbox [binary]="true" inputId="remember"
            [ngModel]="remember()" (ngModelChange)="remember.set($event)" name="remember" />
          <label for="remember">Remember me</label>
        </div>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <p-button
        type="submit"
        label="Sign In"
        icon="pi pi-sign-in"
        styleClass="w-full"
        [loading]="loading()" />
    </form>

    <p class="signup-text">
      Don't have an account? <a href="#">Contact your administrator</a>
    </p>
  </div>
</div>
