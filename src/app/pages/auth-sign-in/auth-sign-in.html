<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-circle"><i class="pi pi-chart-pie"></i></div>
      <h2>Mega Able</h2>
      <p>Sign in to your account</p>
    </div>

    <form class="auth-form">
      <div class="field">
        <label for="email">Email Address</label>
        <input pInputText id="email" type="email" placeholder="john@example.com"
          [ngModel]="email()" (ngModelChange)="email.set($event)" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <p-password
          inputId="password"
          placeholder="Enter your password"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)" />
      </div>

      <div class="remember-row">
        <div class="check-row">
          <p-checkbox [binary]="true" inputId="remember"
            [ngModel]="remember()" (ngModelChange)="remember.set($event)" />
          <label for="remember">Remember me</label>
        </div>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <p-button label="Sign In" icon="pi pi-sign-in" styleClass="w-full" [routerLink]="['/dashboard']" />

      <p-divider align="center"><span class="or-text">OR</span></p-divider>

      <div class="social-btns">
        <p-button icon="pi pi-google" label="Google" severity="secondary" [outlined]="true" styleClass="flex-1" />
        <p-button icon="pi pi-github" label="GitHub" severity="contrast" [outlined]="true" styleClass="flex-1" />
      </div>
    </form>

    <p class="signup-text">
      Don't have an account?
      <a [routerLink]="['/auth/register']">Create one</a>
    </p>
  </div>
</div>
