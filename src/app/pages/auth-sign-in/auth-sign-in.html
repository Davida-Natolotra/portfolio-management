<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div><img src="assets/Logo.png" /></div>
      <h2>Portfolio management platform</h2>
      <p>Sign in to your account</p>
    </div>

    <form (ngSubmit)="submit()" class="auth-form">
      @if (error()) {
        <div class="error-banner">
          <i class="pi pi-exclamation-circle"></i> {{ error() }}
        </div>
      }

      <div class="field">
        <label for="username">Username</label>
        <input (ngModelChange)="username.set($event)" [ngModel]="username()" id="username" name="username"
               pInputText placeholder="Enter your username" required type="text" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <p-password
          (ngModelChange)="password.set($event)"
          [feedback]="false"
          [ngModel]="password()"
          [toggleMask]="true"
          inputId="password"
          name="password"
          placeholder="Enter your password"
          inputStyleClass="w-full"
          styleClass="w-full" />
      </div>

      <div class="remember-row">
        <div class="check-row">
          <p-checkbox (ngModelChange)="remember.set($event)" [binary]="true"
                      [ngModel]="remember()" inputId="remember" name="remember" />
          <label for="remember">Remember me</label>
        </div>
        <a class="forgot-link" href="#">Forgot password?</a>
      </div>

      <p-button
        [loading]="loading()"
        icon="pi pi-sign-in"
        label="Sign In"
        styleClass="w-full"
        type="submit" />
    </form>

    <p class="signup-text">
      Don't have an account? <a href="#">Contact your administrator</a>
    </p>
  </div>
</div>
